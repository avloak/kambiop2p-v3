org: grupo4utecv3
app: kambiop2p
service: kambiop2p-v3-frontend

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole

plugins:
  - serverless-s3-sync

custom:
  s3Sync:
    - bucketName: kambiop2p-v3-frontend-${self:provider.stage}
      localDir: out
      acl: public-read

resources:
  Resources:
    WebsiteBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: kambiop2p-v3-frontend-${self:provider.stage}
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: 404.html
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false

    WebsiteBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: kambiop2p-v3-frontend-${self:provider.stage}
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: 's3:GetObject'
              Resource: 'arn:aws:s3:::kambiop2p-v3-frontend-${self:provider.stage}/*'

  Outputs:
    WebsiteURL:
      Value: !GetAtt WebsiteBucket.WebsiteURL
      Description: URL del sitio web
